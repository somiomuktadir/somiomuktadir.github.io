<!DOCTYPE html>
<html lang="en" class="js-loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F9F8F6" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#161412" media="(prefers-color-scheme: dark)" />
  <title>Coursework &mdash; Muktadir Somio</title>
  <meta name="description" content="Coursework notes in statistics, mathematics, and computing." />
  <meta name="robots" content="index, follow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', "Georgia", "serif"],
            sans: ["Inter", "system-ui", "sans-serif"],
          },
          colors: {
            cream: "#F9F8F6",
            ink: "#1C1C1C",
            espresso: "#6F6A63",
          },
        },
      },
    };
  </script>

  <style>
    :root {
      --ink: #1c1c1c;
      --cream: #f9f8f6;
      --espresso: #6f6a63;
      --hairline: rgba(28, 28, 28, 0.14);
      --card: rgba(255, 255, 255, 0.45);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    .dark {
      --ink: #f2efe9;
      --cream: #161412;
      --espresso: #a39c92;
      --hairline: rgba(242, 239, 233, 0.16);
      --card: rgba(38, 34, 28, 0.4);
    }

    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { background-color: var(--cream); color: var(--ink); font-family: "Inter", system-ui, sans-serif; font-weight: 300; overflow-x: hidden; }
    ::selection { background: rgba(28, 28, 28, 0.08); }
    .dark ::selection { background: rgba(242, 239, 233, 0.14); }

    html.js-loading main, html.js-loading nav { opacity: 0; }
    html:not(.js-loading) main, html:not(.js-loading) nav {
      opacity: 1; transition: opacity 0.6s var(--ease);
    }

    #navbar { transform: translateX(-50%); transition: transform 0.5s var(--ease); }
    #navbar.nav-hidden { transform: translate(-50%, -160%); }

    .bg-grid::after {
      content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(var(--hairline) 1px, transparent 1px),
        linear-gradient(90deg, var(--hairline) 1px, transparent 1px);
      background-size: 88px 88px; opacity: 0.5;
      -webkit-mask-image: radial-gradient(circle at 50% 24%, rgba(0,0,0,0.5), transparent 88%);
      mask-image: radial-gradient(circle at 50% 24%, rgba(0,0,0,0.5), transparent 88%);
    }

    .ulink { position: relative; color: var(--ink); transition: color 0.4s var(--ease); }
    .ulink::after {
      content: ""; position: absolute; left: 0; bottom: -2px; width: 100%; height: 1px;
      background: var(--ink); transform: scaleX(0); transform-origin: right; transition: transform 0.6s var(--ease);
    }
    .ulink:hover { color: var(--espresso); }
    .ulink:hover::after { transform: scaleX(1); transform-origin: left; }

    /* Course card */
    .course-card {
      border: 1px solid var(--hairline);
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 22px;
      transition: border-color 0.5s var(--ease), box-shadow 0.5s var(--ease);
    }
    .course-card:hover {
      box-shadow: 0 24px 50px -30px rgba(28,28,28,0.35);
    }
    .dark .course-card:hover {
      box-shadow: 0 24px 50px -28px rgba(0,0,0,0.55);
    }

    .course-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.25rem;
      padding: 1.6rem 1.75rem;
      text-align: left;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .plus-icon {
      position: relative;
      flex: none;
      width: 34px;
      height: 34px;
      border-radius: 9999px;
      border: 1px solid var(--hairline);
      transition: transform 0.5s var(--ease), border-color 0.4s var(--ease), background-color 0.4s var(--ease);
    }
    .plus-icon::before, .plus-icon::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      background: var(--ink);
      transition: transform 0.45s var(--ease), opacity 0.3s var(--ease);
    }
    .plus-icon::before { width: 12px; height: 1px; transform: translate(-50%, -50%); }
    .plus-icon::after { width: 1px; height: 12px; transform: translate(-50%, -50%); }
    .course-card.open .plus-icon { transform: rotate(135deg); border-color: var(--ink); }

    .course-panel {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.5s var(--ease);
    }
    .course-card.open .course-panel { grid-template-rows: 1fr; }
    .course-panel-inner { overflow: hidden; }

    .topic-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.95rem 1.75rem;
      border-top: 1px solid var(--hairline);
      color: var(--ink);
      transition: background-color 0.35s var(--ease), padding-left 0.35s var(--ease);
    }
    .topic-row:hover { background: rgba(28,28,28,0.035); padding-left: 2.1rem; }
    .dark .topic-row:hover { background: rgba(242,239,233,0.045); }

    @media (hover: hover) and (pointer: fine) {
      body { cursor: none; }
      a, button { cursor: none; }
      .cursor-ring {
        position: fixed; top: 0; left: 0; width: 34px; height: 34px; border: 1.5px solid var(--ink);
        border-radius: 9999px; transform: translate3d(-50%, -50%, 0); pointer-events: none; z-index: 999999;
        transition: width 0.3s var(--ease), height 0.3s var(--ease), background-color 0.3s var(--ease);
      }
      .cursor-dot {
        position: fixed; top: 0; left: 0; width: 5px; height: 5px; background: var(--ink);
        border-radius: 9999px; transform: translate3d(-50%, -50%, 0); pointer-events: none; z-index: 1000000;
      }
      .cursor-ring.hover { width: 54px; height: 54px; background: rgba(28,28,28,0.06); }
      .dark .cursor-ring.hover { background: rgba(242,239,233,0.08); }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      * { transition-duration: 0.01ms !important; }
    }
  </style>
</head>

<body class="bg-grid">
  <div id="preloader" class="fixed inset-0 z-[99999] flex items-center justify-center bg-cream dark:bg-[#161412]">
    <div class="w-44 h-[2px] bg-black/10 dark:bg-white/10 overflow-hidden rounded-full">
      <div id="preloader-bar" class="h-full w-0 bg-ink dark:bg-[#F2EFE9]"></div>
    </div>
  </div>

  <div class="cursor-ring" id="cursor-ring"></div>
  <div class="cursor-dot" id="cursor-dot"></div>

  <nav id="navbar" class="fixed top-[calc(1rem+env(safe-area-inset-top))] left-1/2 z-[1000] w-[min(calc(100%-2rem),1180px)] h-14 flex items-center rounded-full border border-[var(--hairline)] backdrop-blur-xl bg-cream/70 dark:bg-[#161412]/70 shadow-[0_18px_40px_-24px_rgba(28,28,28,0.4)] dark:shadow-[0_18px_45px_-22px_rgba(0,0,0,0.6)]">
    <div class="flex items-center justify-between w-full px-5">
      <a href="index.html" class="font-serif italic text-[0.95rem] text-ink dark:text-[#F2EFE9] ulink">&larr; Muktadir Somio</a>
      <button id="theme-toggle" aria-label="Toggle theme" class="w-10 h-10 flex items-center justify-center rounded-full transition hover:bg-black/5 dark:hover:bg-white/10">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <main class="max-w-[860px] mx-auto px-8 pt-[clamp(8rem,14vw,11.5rem)] pb-[clamp(4.5rem,9vw,7.5rem)] relative z-10">

    <header class="text-center">
      <span class="block font-sans text-[0.74rem] tracking-[0.4em] uppercase text-espresso dark:text-[#A39C92] mb-5">IASDS, DU</span>
      <h1 class="font-serif font-medium text-[clamp(2.4rem,7vw,4.2rem)] leading-[1.02] tracking-tight text-ink dark:text-[#F2EFE9]">Coursework</h1>
      <p class="mt-6 mx-auto max-w-[52ch] font-light text-[clamp(1rem,0.4vw+0.95rem,1.15rem)] leading-relaxed text-espresso dark:text-[#A39C92]">Notes organised by course code. Expand a course to see its topics.</p>
    </header>

    <section class="mt-[clamp(3.5rem,8vw,5.5rem)] flex flex-col gap-5">

      <div class="course-card" id="course-208">
        <button class="course-toggle" aria-expanded="false" aria-controls="panel-208">
          <span>
            <span class="block font-serif font-medium text-[clamp(1.6rem,3vw,2rem)] text-ink dark:text-[#F2EFE9]">208</span>
            <span class="block mt-1 font-light text-[0.95rem] text-espresso dark:text-[#A39C92]">Mathematical Analysis</span>
          </span>
          <span class="plus-icon" aria-hidden="true"></span>
        </button>
        <div class="course-panel" id="panel-208">
          <div class="course-panel-inner">
            <a href="basics.html" class="topic-row group">
              <span class="font-light text-[1rem] text-ink dark:text-[#F2EFE9]">Basics</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-espresso dark:text-[#A39C92] transition-transform duration-300 group-hover:translate-x-1"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </a>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script>
    (function () {
      "use strict";
      var root = document.documentElement;
      var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      var saved = localStorage.getItem("theme");
      var initial = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      applyTheme(initial);
      function applyTheme(t) { root.classList.toggle("dark", t === "dark"); }
      var toggle = document.getElementById("theme-toggle");
      if (toggle) {
        toggle.addEventListener("click", function () {
          var next = root.classList.contains("dark") ? "light" : "dark";
          localStorage.setItem("theme", next);
          applyTheme(next);
        });
      }

      var preloader = document.getElementById("preloader");
      var bar = document.getElementById("preloader-bar");
      function reveal() {
        if (preloader) preloader.style.display = "none";
        root.classList.remove("js-loading");
      }
      window.addEventListener("load", function () {
        if (reduced) { reveal(); return; }
        if (bar) {
          bar.style.transition = "width 0.5s cubic-bezier(0.22,1,0.36,1)";
          requestAnimationFrame(function () { bar.style.width = "100%"; });
        }
        setTimeout(function () {
          if (preloader) {
            preloader.style.transition = "opacity 0.4s ease";
            preloader.style.opacity = "0";
            setTimeout(reveal, 400);
          } else { reveal(); }
        }, 550);
      });
      setTimeout(function () { if (root.classList.contains("js-loading")) reveal(); }, 2500);

      var navbar = document.getElementById("navbar");
      var lastY = window.scrollY;
      window.addEventListener("scroll", function () {
        var y = window.scrollY;
        if (y > 100) {
          if (y > lastY) navbar.classList.add("nav-hidden");
          else navbar.classList.remove("nav-hidden");
        } else {
          navbar.classList.remove("nav-hidden");
        }
        lastY = y;
      }, { passive: true });

      document.querySelectorAll(".course-toggle").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var card = btn.closest(".course-card");
          var expanded = btn.getAttribute("aria-expanded") === "true";
          btn.setAttribute("aria-expanded", String(!expanded));
          card.classList.toggle("open");
        });
      });

      var ring = document.getElementById("cursor-ring");
      var dot = document.getElementById("cursor-dot");
      if (ring && dot && window.matchMedia("(hover: hover) and (pointer: fine)").matches && !reduced) {
        var mx = 0, my = 0, rx = 0, ry = 0;
        window.addEventListener("mousemove", function (e) {
          mx = e.clientX; my = e.clientY;
          dot.style.transform = "translate3d(" + mx + "px," + my + "px,0) translate(-50%,-50%)";
          ring.style.opacity = "1"; dot.style.opacity = "1";
        });
        (function loop() {
          rx += (mx - rx) * 0.16; ry += (my - ry) * 0.16;
          ring.style.transform = "translate3d(" + rx + "px," + ry + "px,0) translate(-50%,-50%)";
          requestAnimationFrame(loop);
        })();
        document.querySelectorAll("a, button").forEach(function (el) {
          el.addEventListener("mouseenter", function () { ring.classList.add("hover"); });
          el.addEventListener("mouseleave", function () { ring.classList.remove("hover"); });
        });
      } else if (ring && dot) {
        ring.style.display = "none"; dot.style.display = "none";
      }
    })();
  </script>
</body>
</html>
