        function displayNotes(year) {
            welcomeMessage.classList.add('hidden');
            notesContent.innerHTML = '';
            notesContent.classList.remove('hidden');

            const yearNotes = notesData[year];
            if (yearNotes && yearNotes.length > 0) {
                yearNotes.forEach(subject => {
                    const card = document.createElement('div');
                    card.className = 'card p-6 flex flex-col items-center text-center';
                    card.innerHTML = `
                        <h3 class="text-xl font-semibold mb-3 text-gray-800">${subject.title}</h3>
                        <button class="btn-primary py-2 px-5 rounded-full font-medium text-sm mt-auto" onclick="openNotesModal('${subject.subjectId}', '${subject.title}')">
                            View Notes
                        </button>
                    `;
                    notesContent.appendChild(card);
                });
            } else {
                notesContent.innerHTML = '<p class="text-lg text-gray-600">No notes available for this year yet.</p>';
            }
        }

        function openNotesModal(subjectId, subjectTitle) {
            modalSubjectTitle.textContent = subjectTitle;
            individualNotesList.innerHTML = '';

            const subjectNotes = notesData[currentYear].find(subject => subject.subjectId === subjectId).notes;

            if (subjectNotes && subjectNotes.length > 0) {
                subjectNotes.forEach(note => {
                    const noteItem = document.createElement('div');
                    noteItem.className = 'flex items-center justify-between p-3 border-b border-gray-200 last:border-b-0';
                    noteItem.innerHTML = `
                        <span class="text-gray-700">${note.title}</span>
                        <a href="${note.file}" target="_blank" rel="noopener noreferrer" class="btn-primary py-2 px-4 rounded-full font-medium text-sm">
                            View
                        </a>
                    `;
                    individualNotesList.appendChild(noteItem);
                });
            } else {
                individualNotesList.innerHTML = '<p class="text-gray-600">No notes available for this subject yet.</p>';
            }
            notesModal.classList.remove('hidden');
            setTimeout(() => {
                notesModal.classList.add('modal-enter-active');
                notesModal.querySelector('.modal-content').classList.add('modal-content-enter-active');
            }, 10);
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            const modalContent = modal.querySelector('.modal-content');

            modal.classList.remove('modal-enter-active');
            modalContent.classList.remove('modal-content-enter-active');
            modalContent.classList.add('modal-content-leave-to');

            modalContent.addEventListener('transitionend', function handler() {
                modal.classList.add('hidden');
                modalContent.classList.remove('modal-content-leave-to');
                modalContent.removeEventListener('transitionend', handler);
            });
        }

        // Initialize display by showing year buttons and welcome message
        yearButtons.forEach(btn => btn.classList.remove('hidden'));
        welcomeMessage.classList.remove('hidden');
        notesContent.classList.add('hidden');

        yearButtons.forEach(button => {
            button.addEventListener('click', () => {
                yearButtons.forEach(btn => btn.classList.remove('active-selection-btn'));
                button.classList.add('active-selection-btn');
                currentYear = button.dataset.year;
                displayNotes(currentYear);
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!notesModal.classList.contains('hidden')) {
                    closeModal('notesModal');
                }
            }
        });
    </script>
</body>
</html>
