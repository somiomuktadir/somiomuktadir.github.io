        function openNotesModal(type, year, subjectId) {
            const subjectData = notesData[type]?.[year]?.find(s => s.subjectId === subjectId);

            if (!subjectData) {
                console.error('Subject data not found for:', { type, year, subjectId });
                return;
            }

            modalSubjectTitle.textContent = subjectData.title;
            individualNotesList.innerHTML = '';

            if (subjectData.notes && subjectData.notes.length > 0) {
                subjectData.notes.forEach(note => {
                    const noteItem = document.createElement('div');
                    noteItem.classList.add('card', 'p-4', 'flex', 'flex-col', 'md:flex-row', 'justify-between', 'items-center', 'space-y-2', 'md:space-y-0', 'md:space-x-4');

                        <h4 class="text-lg font-medium text-gray-700 text-center md:text-left flex-grow">${note.title}</h4>
                        <div class="flex space-x-3">
                            <button onclick="viewPdf('${note.file}')" class="btn-primary py-2 px-5 rounded-full font-semibold text-sm transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75">
                                View
                            </button>
                            <a href="${note.file}" download class="btn-primary py-2 px-5 rounded-full font-semibold text-sm transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75">
                                Download
                            </a>
                        </div>
                    `;
                    individualNotesList.appendChild(noteItem);
                });
            } else {
                individualNotesList.innerHTML = `<p class="text-md text-gray-500 text-center">No individual notes available for this subject.</p>`;
            }

            openModal('notesModal');
        }

        function displayNotes(type, year) {
            notesContent.innerHTML = '';
            welcomeMessage.classList.add('hidden');
            notesContent.classList.remove('hidden');

            const selectedSubjects = notesData[type]?.[year];

            if (selectedSubjects && selectedSubjects.length > 0) {
                selectedSubjects.forEach(subject => {
                    const card = document.createElement('div');
                    card.classList.add('card', 'p-6', 'rounded-xl', 'flex', 'flex-col', 'justify-between', 'items-center', 'text-center', 'space-y-4');
                    
                    card.innerHTML = `
                        <h3 class="text-xl font-semibold text-gray-800">${subject.title}</h3>
                        <div class="flex space-x-4">
                            <button onclick="openNotesModal('${type}', '${year}', '${subject.subjectId}')" class="btn-primary py-2 px-6 rounded-full font-semibold text-sm transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75">
                                View Notes
                            </button>
                        </div>
                    `;
                    notesContent.appendChild(card);
                });
            } else {
                notesContent.innerHTML = `<p class="text-lg text-gray-600 text-center">No subjects available for ${type} in Year ${year}.</p>`;
            }
        }

        function viewPdf(pdfUrl) {
            window.open(pdfUrl, '_blank');
        }

        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            const modalContent = modal.querySelector('.modal-content');

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('modal-enter-active');
                modalContent.classList.add('modal-content-enter-active');
            }, 10);
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            const modalContent = modal.querySelector('.modal-content');

            modal.classList.remove('modal-enter-active');
            modalContent.classList.remove('modal-content-enter-active');
            modalContent.classList.add('modal-content-leave-to');

            modalContent.addEventListener('transitionend', function handler() {
                modal.classList.add('hidden');
                modalContent.classList.remove('modal-content-leave-to');
                modalContent.removeEventListener('transitionend', handler);
            });
        }

        classNotesBtn.addEventListener('click', () => {
            currentNoteType = 'class';
            classNotesBtn.classList.add('active-selection-btn');
            practiceNotesBtn.classList.remove('active-selection-btn');

            yearButtonsContainer.classList.remove('hidden');
            yearButtons.forEach(btn => btn.classList.remove('active-selection-btn'));
            welcomeMessage.classList.remove('hidden');
            notesContent.classList.add('hidden');
            notesContent.innerHTML = '';
            currentYear = null;
        });

        practiceNotesBtn.addEventListener('click', () => {
            currentNoteType = 'practice';
            practiceNotesBtn.classList.add('active-selection-btn');
            classNotesBtn.classList.remove('active-selection-btn');

            yearButtonsContainer.classList.remove('hidden');
            yearButtons.forEach(btn => btn.classList.remove('active-selection-btn'));
            welcomeMessage.classList.remove('hidden');
            notesContent.classList.add('hidden');
            notesContent.innerHTML = '';
            currentYear = null;
        });

        yearButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (currentNoteType) {
                    yearButtons.forEach(btn => btn.classList.remove('active-selection-btn'));
                    button.classList.add('active-selection-btn');
                    currentYear = button.dataset.year;
                    displayNotes(currentNoteType, currentYear);
                } else {
                    welcomeMessage.innerHTML = `<p class="mb-4">Please select either "Class Notes" or "Practice Notes" first, then choose a year.</p>`;
                    welcomeMessage.classList.remove('hidden');
                    notesContent.classList.add('hidden');
                }
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!notesModal.classList.contains('hidden')) {
                    closeModal('notesModal');
                }
            }
        });
    </script>
</body>
</html>
