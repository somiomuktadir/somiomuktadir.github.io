            const subjectData = resourcesData[year]?.find(s => s.resourceId === resourceId);

            if (!subjectData) {
                console.error('Resource data not found for:', { year, resourceId });
                return;
            }

            modalResourceTitle.textContent = subjectData.title;
            individualResourceList.innerHTML = '';

            if (subjectData.items && subjectData.items.length > 0) {
                subjectData.items.forEach(item => {
                    const resourceItem = document.createElement('div');
                    resourceItem.classList.add('card', 'p-4', 'flex', 'flex-col', 'md:flex-row', 'justify-between', 'items-center', 'space-y-2', 'md:space-y-0', 'md:space-x-4');
                    
                    resourceItem.innerHTML = `
                        <h4 class="text-lg font-medium text-gray-700 text-center md:text-left flex-grow">${item.title}</h4>
                        <div class="flex space-x-3">
                            <button onclick="viewPdf('${item.file}')" class="btn-primary py-2 px-5 rounded-full font-semibold text-sm transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75">
                                View
                            </button>
                            <a href="${item.file}" download class="btn-primary py-2 px-5 rounded-full font-semibold text-sm transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75">
                                Download
                            </a>
                        </div>
                    `;
                    individualResourceList.appendChild(resourceItem);
                });
            } else {
                individualResourceList.innerHTML = `<p class="text-md text-gray-500 text-center">No individual resources available for this subject.</p>`;
            }

            openModal('resourcesModal');
        }

        function displayResources(year) {
            resourcesContent.innerHTML = '';
            welcomeMessage.classList.add('hidden');
            resourcesContent.classList.remove('hidden');

            const selectedResources = resourcesData[year];

            if (selectedResources && selectedResources.length > 0) {
                selectedResources.forEach(resource => {
                    const card = document.createElement('div');
                    card.classList.add('card', 'p-6', 'rounded-xl', 'flex', 'flex-col', 'justify-between', 'items-center', 'text-center', 'space-y-4');
                    
                    card.innerHTML = `
                        <h3 class="text-xl font-semibold text-gray-800">${resource.title}</h3>
                        <div class="flex space-x-4">
                            <button onclick="openResourcesModal('${year}', '${resource.resourceId}')" class="btn-primary py-2 px-6 rounded-full font-semibold text-sm transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75">
                                View Resources
                            </button>
                        </div>
                    `;
                    resourcesContent.appendChild(card);
                });
            } else {
                resourcesContent.innerHTML = `<p class="text-lg text-gray-600 text-center">No resources available for Year ${year}.</p>`;
            }
        }

        function viewPdf(pdfUrl) {
            window.open(pdfUrl, '_blank');
        }

        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            const modalContent = modal.querySelector('.modal-content');

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('modal-enter-active');
                modalContent.classList.add('modal-content-enter-active');
            }, 10);
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            const modalContent = modal.querySelector('.modal-content');

            modal.classList.remove('modal-enter-active');
            modalContent.classList.remove('modal-content-enter-active');
            modalContent.classList.add('modal-content-leave-to');

            modalContent.addEventListener('transitionend', function handler() {
                modal.classList.add('hidden');
                modalContent.classList.remove('modal-content-leave-to');
                modalContent.removeEventListener('transitionend', handler);
            });
        }

        yearButtons.forEach(button => {
            button.addEventListener('click', () => {
                yearButtons.forEach(btn => btn.classList.remove('active-selection-btn'));
                button.classList.add('active-selection-btn');
                currentYear = button.dataset.year;
                displayResources(currentYear);
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!resourcesModal.classList.contains('hidden')) {
                    closeModal('resourcesModal');
                }
            }
        });
    </script>
</body>
</html>
