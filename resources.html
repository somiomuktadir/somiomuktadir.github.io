        function displayResources(year) {
            welcomeMessage.classList.add('hidden');
            resourcesContent.innerHTML = '';
            resourcesContent.classList.remove('hidden');

            const yearSubjects = resourcesData.subjects[year];
            if (yearSubjects && yearSubjects.length > 0) {
                yearSubjects.forEach(subject => {
                    const card = document.createElement('div');
                    card.className = 'card p-6 flex flex-col items-center text-center';
                    card.innerHTML = `
                        <h3 class="text-xl font-semibold mb-3 text-gray-800">${subject.title}</h3>
                        <button class="btn-primary py-2 px-5 rounded-full font-medium text-sm mt-auto" onclick="openResourcesModal('${subject.resourceId}')">
                            View Resources
                        </button>
                    `;
                    resourcesContent.appendChild(card);
                });
            } else {
                resourcesContent.innerHTML = '<p class="text-lg text-gray-600">No subject resources available for this year yet.</p>';
            }
        }

        function openResourcesModal(resourceId) {
            individualResourceList.innerHTML = ''; // Clear previous content

            const subject = resourcesData.subjects[currentYear].find(s => s.resourceId === resourceId);

            if (subject) {
                modalResourceTitle.textContent = `${subject.title} Resources`;

                // Add Books
                if (subject.books && subject.books.length > 0) {
                    const booksHeader = document.createElement('h3');
                    booksHeader.className = 'text-xl font-semibold mt-4 mb-2 text-gray-800';
                    booksHeader.textContent = 'Books';
                    individualResourceList.appendChild(booksHeader);

                    subject.books.forEach(item => {
                        const resourceItem = document.createElement('div');
                        resourceItem.className = 'flex items-center justify-between p-3 border-b border-gray-200 last:border-b-0';
                        resourceItem.innerHTML = `
                            <span class="text-gray-700">${item.title}</span>
                            <a href="${item.file ? item.file : '#'}" target="_blank" rel="noopener noreferrer" class="btn-primary py-2 px-4 rounded-full font-medium text-sm">
                                View
                            </a>
                        `;
                        individualResourceList.appendChild(resourceItem);
                    });
                }

                // Add Questions
                if (subject.questions && subject.questions.length > 0) {
                    const questionsHeader = document.createElement('h3');
                    questionsHeader.className = 'text-xl font-semibold mt-4 mb-2 text-gray-800';
                    questionsHeader.textContent = 'Questions';
                    individualResourceList.appendChild(questionsHeader);

                    subject.questions.forEach(item => {
                        const resourceItem = document.createElement('div');
                        resourceItem.className = 'flex items-center justify-between p-3 border-b border-gray-200 last:border-b-0';
                        resourceItem.innerHTML = `
                            <span class="text-gray-700">${item.title}</span>
                            <a href="${item.file ? item.file : '#'}" target="_blank" rel="noopener noreferrer" class="btn-primary py-2 px-4 rounded-full font-medium text-sm">
                                View
                            </a>
                        `;
                        individualResourceList.appendChild(resourceItem);
                    });
                }

                if ((!subject.books || subject.books.length === 0) && (!subject.questions || subject.questions.length === 0)) {
                    individualResourceList.innerHTML = '<p class="text-gray-600">No resources available for this subject yet.</p>';
                }

            } else {
                individualResourceList.innerHTML = '<p class="text-gray-600">Subject not found.</p>';
            }

            resourcesModal.classList.remove('hidden');
            setTimeout(() => {
                resourcesModal.classList.add('modal-enter-active');
                resourcesModal.querySelector('.modal-content').classList.add('modal-content-enter-active');
            }, 10);
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            const modalContent = modal.querySelector('.modal-content');

            modal.classList.remove('modal-enter-active');
            modalContent.classList.remove('modal-content-enter-active');
            modalContent.classList.add('modal-content-leave-to');

            modalContent.addEventListener('transitionend', function handler() {
                modal.classList.add('hidden');
                modalContent.classList.remove('modal-content-leave-to');
                modalContent.removeEventListener('transitionend', handler);
            });
        }

        yearButtons.forEach(button => {
            button.addEventListener('click', () => {
                yearButtons.forEach(btn => btn.classList.remove('active-selection-btn'));
                button.classList.add('active-selection-btn');
                currentYear = button.dataset.year;
                displayResources(currentYear);
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!resourcesModal.classList.contains('hidden')) {
                    closeModal('resourcesModal');
                }
            }
        });
    </script>
